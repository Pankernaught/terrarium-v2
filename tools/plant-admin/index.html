<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🌿 Plant Admin</title>
<style>
  :root {
    --bg: #11160f; --panel: #19211603; --panel-solid: #1b2418; --line: #2c3a2a;
    --ink: #e8efe4; --muted: #93a58c; --accent: #7cc47a; --accent-ink: #0e1a0d;
    --danger: #e07a6a; --danger-bg: #3a201c; --field: #131a11; --warn: #d9b45a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    height: 100vh; overflow: hidden; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: baseline; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 650; }
  header .count { color: var(--muted); font-size: 13px; }
  header .save-note { margin-left: auto; color: var(--muted); font-size: 12px; }
  /* --- entity toggle (Plants | Terms) --- */
  .seg { display: inline-flex; align-self: center; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .seg button { border: 0; border-radius: 0; background: transparent; color: var(--muted); padding: 5px 14px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .seg button:hover { border: 0; color: var(--ink); }
  .seg button.active { background: var(--accent); color: var(--accent-ink); }
  .layout { display: grid; grid-template-columns: 320px 1fr 210px; flex: 1; min-height: 0; }
  /* --- list --- */
  .list { border-right: 1px solid var(--line); display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .list .controls { padding: 12px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid var(--line); }
  .list .rows { overflow: auto; flex: 1; }
  .row {
    padding: 10px 12px; border-bottom: 1px solid var(--line); cursor: pointer; min-width: 0;
    display: flex; align-items: center; gap: 10px;
  }
  .row-info { flex: 1; min-width: 0; }
  .row:hover { background: #1a221700; }
  .row.active { background: #20301c; box-shadow: inset 3px 0 0 var(--accent); }
  .row .cn { font-weight: 600; }
  .row .sn { color: var(--muted); font-style: italic; font-size: 12.5px; }
  .row .slug { color: #6f8268; font-size: 11px; font-family: ui-monospace, monospace; }
  .verify-check { flex-shrink: 0; display: flex; align-items: center; padding: 2px 4px; }
  .verify-check input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .row.verified .cn { color: var(--accent); }
  /* --- form --- */
  .form { padding: 18px 22px 0; overflow: auto; max-width: 860px; min-height: 0; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .group { margin-bottom: 26px; }
  .group h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: .07em; color: var(--accent);
    margin: 0 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--line);
  }
  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px 18px; }
  .field.col-2 { grid-column: 1 / -1; }
  label.fl { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
  label.fl .req { color: var(--accent); }
  .help { color: var(--muted); font-size: 11.5px; margin-top: 3px; }
  input[type=text], input[type=number], textarea, select {
    width: 100%; background: var(--field); color: var(--ink); border: 1px solid var(--line);
    border-radius: 7px; padding: 8px 9px; font: inherit;
  }
  textarea { min-height: 60px; resize: vertical; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  .field.invalid input, .field.invalid textarea, .field.invalid select,
  .field.invalid .multi, .field.invalid .req-row { border-color: var(--danger); }
  .err { color: var(--danger); font-size: 11.5px; margin-top: 3px; min-height: 0; }
  .req-row, .range-row { display: flex; gap: 8px; align-items: flex-end; }
  .req-col { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .req-sublabel { font-size: 11.5px; font-weight: 600; color: var(--muted); }
  .range-row span { color: var(--muted); }
  .multi { display: flex; flex-wrap: wrap; gap: 6px 14px; border: 1px solid transparent; border-radius: 7px; }
  .multi label { display: flex; align-items: center; gap: 6px; font-weight: 400; cursor: pointer; }
  .bool { display: flex; gap: 6px; }
  .bool label { display: flex; align-items: center; gap: 6px; font-weight: 400; cursor: pointer; padding: 6px 12px; border: 1px solid var(--line); border-radius: 7px; }
  .bool input[type=radio] { width: 15px; height: 15px; accent-color: var(--accent); }
  .bool label:has(input:checked) { border-color: var(--accent); background: #1d2e1a; }
  .kv-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .kv-row input { flex: 1; }
  .kv-row .kv-k { flex: 0 0 32%; }
  .link-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .link-row input { flex: 1; }
  .link-row .link-label { flex: 0 0 32%; }
  /* --- sluglist (glossary seeAlso) --- */
  .slug-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .slug-row input { flex: 1; font-family: ui-monospace, monospace; font-size: 12.5px; }
  .slug-row.invalid input { border-color: var(--danger); }
  /* --- buttons --- */
  button {
    font: inherit; border: 1px solid var(--line); background: var(--panel-solid); color: var(--ink);
    border-radius: 7px; padding: 8px 14px; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 650; }
  button.ghost { background: transparent; }
  button.danger { color: var(--danger); border-color: var(--danger); background: transparent; }
  button.danger:hover { background: var(--danger-bg); }
  button.mini { padding: 5px 9px; font-size: 12px; }
  .form-bottom { padding: 8px 0 40px; display: flex; gap: 10px; align-items: center; }
  .form-heading { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .form-heading h2 { margin: 0; }
  /* --- image --- */
  .img-box { display: flex; gap: 14px; align-items: flex-start; }
  .img-prev {
    width: 96px; height: 72px; border: 1px dashed var(--line); border-radius: 7px; object-fit: cover;
    background: var(--field) center/contain no-repeat; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; text-align: center;
  }
  /* --- toast --- */
  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--panel-solid); border: 1px solid var(--line); border-radius: 9px;
    padding: 11px 18px; opacity: 0; transition: .2s; pointer-events: none; max-width: 70vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: var(--accent); }
  #toast.bad { border-color: var(--danger); }
  .autosave-status { font-size: 12px; color: var(--muted); transition: color .15s; }
  .autosave-status.ok { color: var(--accent); }
  .autosave-status.bad { color: var(--danger); }
  /* --- modal --- */
  #modal {
    position: fixed; inset: 0; background: #000a; display: none; align-items: center; justify-content: center; z-index: 20;
  }
  #modal.show { display: flex; }
  .dialog { background: var(--panel-solid); border: 1px solid var(--line); border-radius: 12px; padding: 22px; max-width: 420px; }
  .dialog h3 { margin: 0 0 10px; }
  .dialog p { color: var(--muted); }
  .dialog .row-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
  .badge { font-size: 11px; color: var(--warn); }
  /* --- verify panel --- */
  .verify-panel {
    border-left: 1px solid var(--line); display: flex; flex-direction: column; overflow: auto; min-height: 0;
  }
  .vp-header {
    display: flex; align-items: baseline; gap: 8px; padding: 12px 14px 10px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 2;
  }
  .vp-title { font-size: 12px; font-weight: 650; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; flex: 1; }
  .vp-count { font-size: 12px; color: var(--accent); font-variant-numeric: tabular-nums; }
  .vp-empty { color: var(--muted); font-size: 13px; padding: 28px 14px; text-align: center; }
  .vp-good { color: var(--accent); font-size: 13px; padding: 24px 14px; text-align: center; line-height: 1.5; }
  .vf-group { padding: 10px 14px 4px; }
  .vf-group-title {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--accent);
    margin: 0 0 6px; padding-bottom: 5px; border-bottom: 1px solid var(--line);
  }
  .vf-item { display: flex; align-items: center; gap: 7px; padding: 2px 0; cursor: pointer; }
  .vf-item input { width: 13px; height: 13px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
  .vf-item span { font-size: 12px; color: var(--muted); line-height: 1.3; }
  .vf-item.checked span { color: var(--ink); }
  /* --- coverage worklist (Terms verify panel) --- */
  .vf-cov {
    display: block; width: 100%; text-align: left; border: 1px solid var(--line);
    background: var(--field); border-radius: 7px; padding: 7px 9px; margin: 0 0 6px;
  }
  .vf-cov:hover { border-color: var(--accent); }
  .vf-cov .cov-slug { font-family: ui-monospace, monospace; font-size: 12.5px; color: var(--ink); }
  .vf-cov .cov-cat { font-size: 11px; color: var(--muted); margin-top: 1px; }
</style>

<header>
  <h1>🌿 Plant Admin</h1>
  <span class="count" id="count"></span>
  <div class="seg" id="entityToggle">
    <button type="button" data-entity="plants" class="active">Plants</button>
    <button type="button" data-entity="terms">Terms</button>
  </div>
  <span class="save-note" id="saveNote">Autosaves to <code>src/data/plants.json</code> · restart Expo to apply</span>
</header>

<div class="layout">
  <aside class="list">
    <div class="controls">
      <button class="primary" id="addBtn">+ Add plant</button>
      <input type="text" id="search" placeholder="Search name or slug…" />
      <select id="filter"><option value="">All plant types</option></select>
    </div>
    <div class="rows" id="rows"></div>
  </aside>
  <main class="form" id="form">
    <div class="empty">Select a plant to edit, or click <strong>+ Add plant</strong>.</div>
  </main>
  <aside class="verify-panel" id="verifyPanel">
    <div class="vp-empty">Select a plant to see field checks.</div>
  </aside>
</div>

<datalist id="term-slugs"></datalist>
<div id="toast"></div>
<div id="modal">
  <div class="dialog">
    <h3 id="mTitle"></h3>
    <p id="mBody"></p>
    <div class="row-btns">
      <button class="ghost" id="mCancel">Cancel</button>
      <button class="danger" id="mOk">Delete</button>
    </div>
  </div>
</div>

<script>
/*__FIELD_SPEC__*/
window.SPEC = SPEC;
</script>

<script>
(function () {
  const SPEC = window.SPEC;
  const $ = (s, r = document) => r.querySelector(s);

  // ---- per-entity config: one form engine, two entities (plants / glossary terms) ----
  const MODES = {
    plants: {
      label: 'Plants', noun: 'plant', api: '/api/plants',
      groups: SPEC.GROUPS, fields: SPEC.ALL_FIELDS,
      autoSlugFrom: 'scientificName', hasImage: true,
      addLabel: '+ Add plant', searchPlaceholder: 'Search name or slug…',
      saveNote: 'Autosaves to <code>src/data/plants.json</code> · restart Expo to apply',
      dataKey: 'plants', payloadFromData: (d) => d.plants,
      listPrimary: (r) => r.commonName || r.slug,
      listSecondary: (r) => r.scientificName || '',
      searchText: (r) => [r.commonName, r.scientificName, r.slug],
      title: (r) => r.commonName || r.slug,
      newRecord: () => ({ substrateTags: [], closedTerrariumOk: false, openTerrariumOk: false }),
      filter: {
        label: 'All plant types',
        options: () => SPEC.PLANT_TYPES,
        optionLabel: (v) => v,
        match: (r, v) => r.plantType === v,
      },
      deleteWarning: () => `This removes the plant from the catalog. Any saved build that used it will point at a missing plant until you re-add it, and its photo/placeholder files are left on disk. This can't be undone from here (use git to recover).`,
    },
    terms: {
      label: 'Terms', noun: 'term', api: '/api/glossary',
      groups: SPEC.GLOSSARY_GROUPS, fields: SPEC.GLOSSARY_ALL_FIELDS,
      autoSlugFrom: 'term', hasImage: false,
      addLabel: '+ Add term', searchPlaceholder: 'Search term or slug…',
      saveNote: 'Autosaves to <code>src/data/glossary.json</code> · restart Expo to apply',
      dataKey: 'terms', payloadFromData: (d) => d.terms,
      listPrimary: (r) => r.term || r.slug,
      listSecondary: (r) => SPEC.GLOSSARY_CATEGORY_LABELS[r.category] || r.category || '',
      searchText: (r) => [r.term, r.slug, r.category],
      title: (r) => r.term || r.slug,
      newRecord: () => ({ seeAlso: [] }),
      filter: {
        label: 'All categories',
        options: () => SPEC.GLOSSARY_CATEGORIES,
        optionLabel: (v) => SPEC.GLOSSARY_CATEGORY_LABELS[v] || v,
        match: (r, v) => r.category === v,
      },
      deleteWarning: (slug) => `This removes the term from the glossary. Any other entry's "see also" link, and any plant prose <code>[[${slug}]]</code> link, will dangle until you re-add it (CI catches a dangling prose link). This can't be undone from here (use git to recover).`,
    },
  };

  const state = {
    entity: 'plants',  // 'plants' | 'terms'
    plants: [],
    terms: [],
    termsLoaded: false,
    missing: [],       // coverage worklist (terms mode)
    mode: null,        // 'add' | 'edit'
    originalSlug: null,
    imageDataUrl: null,
    touched: new Set(),
    slugDirty: false,
    search: '',
    filterValue: '',
    verified: new Set(JSON.parse(localStorage.getItem('plant-verified') || '[]')),
    fieldVerified: JSON.parse(localStorage.getItem('plant-field-verified') || '{}'),
  };

  function cfg() { return MODES[state.entity]; }
  function records() { return state[cfg().dataKey]; }

  // ---- API ----
  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: body ? { 'Content-Type': 'application/json' } : undefined,
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { const e = new Error(data.error || res.statusText); e.data = data; throw e; }
    return data;
  }

  function toast(msg, kind) {
    const t = $('#toast');
    t.textContent = msg;
    t.className = 'show ' + (kind || '');
    setTimeout(() => (t.className = ''), 3600);
  }

  // ---- validation (threads the entity's extra arg) ----
  function otherSlugs() {
    return new Set(records().map((r) => r.slug).filter((s) => s !== state.originalSlug));
  }

  // Glossary slug set for the plant prose-link check. Undefined until the glossary
  // has loaded, so we never false-flag every [[link]] on a cold start.
  function glossarySlugSet() {
    return state.termsLoaded ? new Set(state.terms.map((t) => t.slug)) : undefined;
  }

  function validateActive(rec) {
    const others = otherSlugs();
    if (state.entity === 'plants') return SPEC.validatePlant(rec, others, glossarySlugSet());
    return SPEC.validateTerm(rec, others, others); // validateTerm adds the record's own slug
  }

  // ---- list ----
  function matchesFilter(r) {
    const q = state.search.trim().toLowerCase();
    if (q && !cfg().searchText(r).some((s) => (s || '').toLowerCase().includes(q))) return false;
    if (state.filterValue && !cfg().filter.match(r, state.filterValue)) return false;
    return true;
  }

  function renderList() {
    const c = cfg();
    $('#count').textContent = `${records().length} ${c.label.toLowerCase()}`;
    const rows = $('#rows');
    const shown = records().filter(matchesFilter)
      .sort((a, b) => c.listPrimary(a).localeCompare(c.listPrimary(b)));
    rows.innerHTML = shown.map((r) => {
      const isActive = state.mode === 'edit' && state.originalSlug === r.slug;
      const isVerified = state.entity === 'plants' && state.verified.has(r.slug);
      const verifyBox = state.entity === 'plants'
        ? `<label class="verify-check" title="Mark as verified"><input type="checkbox" data-verify="${esc(r.slug)}" ${isVerified ? 'checked' : ''} /></label>`
        : '';
      return `<div class="row${isActive ? ' active' : ''}${isVerified ? ' verified' : ''}" data-slug="${esc(r.slug)}">
        <div class="row-info">
          <div class="cn">${esc(c.listPrimary(r))}</div>
          <div class="sn">${esc(c.listSecondary(r))}</div>
          <div class="slug">${esc(r.slug)}</div>
        </div>
        ${verifyBox}
      </div>`;
    }).join('') || `<div class="empty">No matches.</div>`;
  }

  // ---- form rendering ----
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function controlHtml(f, v) {
    const dk = `data-key="${f.key}"`;
    switch (f.kind) {
      case 'textarea':
        return `<textarea ${dk}>${esc(v || '')}</textarea>`;
      case 'number':
        return `<input type="number" ${dk} value="${v == null ? '' : esc(v)}" ${f.min != null ? `min="${f.min}"` : ''} ${f.max != null ? `max="${f.max}"` : ''} step="${f.int ? 1 : 'any'}" />`;
      case 'enum': {
        const opts = ['<option value="">—</option>']
          .concat(f.options.map((o) => `<option ${o === v ? 'selected' : ''}>${esc(o)}</option>`));
        return `<select ${dk}>${opts.join('')}</select>`;
      }
      case 'bool': {
        const uid = f.key + '-' + Math.random().toString(36).slice(2);
        return `<div class="bool">
          <label><input type="radio" name="${uid}" ${dk} value="yes" ${v ? 'checked' : ''} /> Yes</label>
          <label><input type="radio" name="${uid}" ${dk} value="no" ${!v ? 'checked' : ''} /> No</label>
        </div>`;
      }
      case 'requirement': {
        const pri = (v && v.primary) || '';
        const sec = (v && v.secondary) || '';
        const opt = (sel, blank) => `<option value="">${esc(blank)}</option>` + f.options.map((o) => `<option ${o === sel ? 'selected' : ''}>${esc(o)}</option>`).join('');
        return `<div class="req-row">
          <div class="req-col">
            <span class="req-sublabel">Primary</span>
            <select ${dk} data-part="primary">${opt(pri, '— choose —')}</select>
          </div>
          <div class="req-col">
            <span class="req-sublabel">Secondary <span style="font-weight:400;color:var(--muted)">(optional)</span></span>
            <select ${dk} data-part="secondary">${opt(sec, '— none —')}</select>
          </div>
        </div>`;
      }
      case 'range': {
        const a = v && v[0] != null ? v[0] : '';
        const b = v && v[1] != null ? v[1] : '';
        const at = `${f.min != null ? `min="${f.min}"` : ''} ${f.max != null ? `max="${f.max}"` : ''} step="${f.int ? 1 : 'any'}"`;
        return `<div class="range-row">
          <input type="number" ${dk} data-idx="0" value="${a === '' ? '' : esc(a)}" ${at} placeholder="min" />
          <span>–</span>
          <input type="number" ${dk} data-idx="1" value="${b === '' ? '' : esc(b)}" ${at} placeholder="max" />
        </div>`;
      }
      case 'multi': {
        const set = new Set(v || []);
        return `<div class="multi" ${dk}>` + f.options.map((o) =>
          `<label><input type="checkbox" value="${esc(o.id)}" ${set.has(o.id) ? 'checked' : ''} /> ${esc(o.label)}</label>`).join('') + `</div>`;
      }
      case 'kv': {
        const entries = v ? Object.entries(v) : [];
        const row = (k, val) => `<div class="kv-row">
          <input type="text" class="kv-k" placeholder="key" value="${esc(k)}" />
          <input type="text" class="kv-v" placeholder="value" value="${esc(val)}" />
          <button type="button" class="mini ghost kv-del">✕</button></div>`;
        return `<div class="kv" ${dk}>${entries.map(([k, val]) => row(k, val)).join('')}
          <button type="button" class="mini ghost kv-add">+ Add note</button></div>`;
      }
      case 'links': {
        const items = Array.isArray(v) ? v : [];
        const row = (url, label) => `<div class="link-row">
          <input type="text" class="link-url" placeholder="https://…" value="${esc(url)}" />
          <input type="text" class="link-label" placeholder="label (optional)" value="${esc(label)}" />
          <button type="button" class="mini ghost link-open" title="Open link">↗</button>
          <button type="button" class="mini ghost link-del">✕</button></div>`;
        return `<div class="links" ${dk}>${items.map((it) => row(it.url || '', it.label || '')).join('')}
          <button type="button" class="mini ghost link-add">+ Add link</button></div>`;
      }
      case 'sluglist': {
        const items = Array.isArray(v) ? v : [];
        const row = (s) => `<div class="slug-row">
          <input type="text" class="slug-input" list="term-slugs" placeholder="related-term-slug" value="${esc(s)}" />
          <button type="button" class="mini ghost slug-del">✕</button></div>`;
        return `<div class="sluglist" ${dk}>${items.map(row).join('')}
          <button type="button" class="mini ghost slug-add">+ Add link</button></div>`;
      }
      default: // text
        return `<input type="text" ${dk} value="${esc(v || '')}" />`;
    }
  }

  function fieldHtml(f, rec) {
    const wide = f.kind === 'textarea' || f.kind === 'multi' || f.kind === 'kv'
      || f.kind === 'links' || f.kind === 'sluglist' || f.kind === 'requirement';
    return `<div class="field ${wide ? 'col-2' : ''}" data-field="${f.key}">
      <label class="fl">${esc(f.label)}${f.required ? ' <span class="req">*</span>' : ''}</label>
      ${controlHtml(f, rec[f.key])}
      ${f.help ? `<div class="help">${esc(f.help)}</div>` : ''}
      <div class="err"></div>
    </div>`;
  }

  function imageGroupHtml(rec) {
    const slug = rec.slug || '<slug>';
    const prev = state.imageDataUrl
      ? `<img class="img-prev" src="${state.imageDataUrl}" />`
      : `<div class="img-prev">no upload<br>(uses placeholder)</div>`;
    return `<div class="group"><h2>Photo</h2>
      <div class="img-box">
        ${prev}
        <div>
          <input type="file" id="imgFile" accept="image/png" />
          <div class="help">Optional. Saved to <code>assets/plants/${esc(slug)}.png</code> on save. PNG only.
          Leave empty to keep the stylized placeholder. <span class="badge">Real photos must be CC-licensed — fill credit/license above.</span></div>
        </div>
      </div></div>`;
  }

  function renderForm(rec) {
    const c = cfg();
    const form = $('#form');
    const heading = state.mode === 'add' ? `New ${c.noun}` : `Editing: ${c.title(rec)}`;
    const statusOrBtn = state.mode === 'add'
      ? '' : `<span id="autosaveStatus" class="autosave-status"></span>`;
    form.innerHTML =
      `<div class="group"><div class="form-heading"><h2>${esc(heading)}</h2>${statusOrBtn}</div></div>` +
      c.groups.map((g) =>
        `<div class="group"><h2>${esc(g.title)}</h2><div class="grid">${g.fields.map((f) => fieldHtml(f, rec)).join('')}</div></div>`
      ).join('') +
      (c.hasImage ? imageGroupHtml(rec) : '') +
      `<div class="form-bottom">
        ${state.mode === 'add' ? `<button class="primary" id="saveBtn">Add ${esc(c.noun)}</button>` : ''}
        ${state.mode === 'edit' ? '<button class="danger" id="delBtn">Delete…</button>' : ''}
      </div>`;
    wireForm();
    showErrors(false);
  }

  // ---- read DOM → record ----
  function num(el) { const s = el.value.trim(); if (s === '') return undefined; const n = Number(s); return Number.isNaN(n) ? undefined : n; }

  function collect() {
    const form = $('#form');
    const rec = {};
    for (const f of cfg().fields) {
      if (f.kind === 'requirement') {
        const pri = form.querySelector(`[data-key="${f.key}"][data-part="primary"]`).value;
        const sec = form.querySelector(`[data-key="${f.key}"][data-part="secondary"]`).value;
        if (pri) { rec[f.key] = sec ? { primary: pri, secondary: sec } : { primary: pri }; }
      } else if (f.kind === 'range') {
        const a = num(form.querySelector(`[data-key="${f.key}"][data-idx="0"]`));
        const b = num(form.querySelector(`[data-key="${f.key}"][data-idx="1"]`));
        if (a != null || b != null) rec[f.key] = [a == null ? NaN : a, b == null ? NaN : b];
      } else if (f.kind === 'multi') {
        const ids = [...form.querySelectorAll(`[data-key="${f.key}"] input:checked`)].map((c) => c.value);
        if (ids.length) rec[f.key] = ids;
      } else if (f.kind === 'kv') {
        const obj = {};
        form.querySelectorAll(`[data-key="${f.key}"] .kv-row`).forEach((r) => {
          const k = r.querySelector('.kv-k').value.trim();
          const val = r.querySelector('.kv-v').value;
          if (k) obj[k] = val;
        });
        if (Object.keys(obj).length) rec[f.key] = obj;
      } else if (f.kind === 'links') {
        const arr = [];
        form.querySelectorAll(`[data-key="${f.key}"] .link-row`).forEach((r) => {
          const url = r.querySelector('.link-url').value.trim();
          const label = r.querySelector('.link-label').value.trim();
          if (url) arr.push(label ? { url, label } : { url });
        });
        if (arr.length) rec[f.key] = arr;
      } else if (f.kind === 'sluglist') {
        const arr = [];
        form.querySelectorAll(`[data-key="${f.key}"] .slug-row`).forEach((r) => {
          const s = r.querySelector('.slug-input').value.trim();
          if (s) arr.push(s);
        });
        if (arr.length) rec[f.key] = arr;
      } else if (f.kind === 'bool') {
        const checked = form.querySelector(`[data-key="${f.key}"]:checked`);
        rec[f.key] = checked ? checked.value === 'yes' : false;
      } else if (f.kind === 'number') {
        const n = num(form.querySelector(`[data-key="${f.key}"]`));
        if (n != null) rec[f.key] = n;
      } else {
        const v = form.querySelector(`[data-key="${f.key}"]`).value.trim();
        if (v) rec[f.key] = v;
      }
    }
    return rec;
  }

  function showErrors(all) {
    const rec = collect();
    const errors = validateActive(rec);
    for (const f of cfg().fields) {
      const wrap = document.querySelector(`.field[data-field="${f.key}"]`);
      if (!wrap) continue;
      const show = (all || state.touched.has(f.key)) && errors[f.key];
      wrap.classList.toggle('invalid', !!show);
      wrap.querySelector('.err').textContent = show ? errors[f.key] : '';
    }
    markSeeAlsoRows(rec);
    return errors;
  }

  // Flag individual unresolved seeAlso rows inline (terms mode only).
  function markSeeAlsoRows(rec) {
    if (state.entity !== 'terms') return;
    const box = document.querySelector('[data-key="seeAlso"]');
    if (!box) return;
    const resolvable = otherSlugs();
    if (rec.slug) resolvable.add(rec.slug);
    box.querySelectorAll('.slug-row').forEach((row) => {
      const val = row.querySelector('.slug-input').value.trim();
      row.classList.toggle('invalid', !!val && !resolvable.has(val));
    });
  }

  // ---- wiring ----
  function wireForm() {
    const form = $('#form');
    const c = cfg();

    // auto-slug from the entity's source field, until the curator overrides it
    const srcEl = form.querySelector(`[data-key="${c.autoSlugFrom}"]`);
    const slugEl = form.querySelector('[data-key="slug"]');
    if (srcEl && slugEl) {
      srcEl.addEventListener('input', () => {
        if (!state.slugDirty) slugEl.value = SPEC.slugify(srcEl.value);
      });
      slugEl.addEventListener('input', () => { state.slugDirty = true; });
    }

    // on-blur validation: mark touched + revalidate
    form.addEventListener('blur', (e) => {
      const ctrl = e.target.closest('[data-key]');
      if (!ctrl) return;
      const key = ctrl.getAttribute('data-key');
      state.touched.add(key);
      showErrors(false);
    }, true);

    // image upload (plants only)
    if (c.hasImage) {
      const file = form.querySelector('#imgFile');
      if (file) file.addEventListener('change', () => {
        const f = file.files[0];
        if (!f) { state.imageDataUrl = null; return; }
        if (f.type !== 'image/png') { toast('PNG only', 'bad'); file.value = ''; return; }
        const reader = new FileReader();
        reader.onload = () => {
          state.imageDataUrl = reader.result;
          const box = form.querySelector('.img-prev');
          box.outerHTML = `<img class="img-prev" src="${state.imageDataUrl}" />`;
        };
        reader.readAsDataURL(f);
      });
    }

    const saveBtn = $('#saveBtn');
    if (saveBtn) saveBtn.addEventListener('click', save);
    const del = $('#delBtn');
    if (del) del.addEventListener('click', confirmDelete);

    // autosave: debounce any input/change in the form when editing
    form.addEventListener('input', scheduleAutoSave);
    form.addEventListener('change', scheduleAutoSave);
  }

  // ---- verify panel (plants: per-field checks · terms: coverage worklist) ----
  function renderVerifyPanel() {
    const panel = document.getElementById('verifyPanel');
    if (!panel) return;
    if (state.entity === 'terms') return renderCoveragePanel(panel);

    if (state.mode !== 'edit' || !state.originalSlug) {
      panel.innerHTML = '<div class="vp-empty">Select a plant to see field checks.</div>';
      return;
    }
    const slug = state.originalSlug;
    const checked = new Set(state.fieldVerified[slug] || []);
    const total = cfg().fields.length;
    const done = cfg().fields.filter((f) => checked.has(f.key)).length;
    panel.innerHTML =
      `<div class="vp-header"><span class="vp-title">Verified</span><span class="vp-count">${done} / ${total}</span></div>` +
      cfg().groups.map((g) =>
        `<div class="vf-group"><div class="vf-group-title">${esc(g.title)}</div>` +
        g.fields.map((f) => {
          const on = checked.has(f.key);
          return `<label class="vf-item${on ? ' checked' : ''}"><input type="checkbox" data-fv="${esc(f.key)}" ${on ? 'checked' : ''} /><span>${esc(f.label)}</span></label>`;
        }).join('') +
        `</div>`
      ).join('');
  }

  // The coverage worklist: enum-backed vocab values with no glossary entry yet.
  function renderCoveragePanel(panel) {
    const missing = state.missing || [];
    if (!missing.length) {
      panel.innerHTML =
        `<div class="vp-header"><span class="vp-title">Coverage</span><span class="vp-count">✓</span></div>` +
        `<div class="vp-good">Every enum-backed vocab value has a glossary entry.<br>Nothing to fill in. 🎉</div>`;
      return;
    }
    const byCat = {};
    for (const m of missing) (byCat[m.category] = byCat[m.category] || []).push(m);
    panel.innerHTML =
      `<div class="vp-header"><span class="vp-title">Coverage gaps</span><span class="vp-count">${missing.length}</span></div>` +
      Object.keys(byCat).map((cat) =>
        `<div class="vf-group"><div class="vf-group-title">${esc(SPEC.GLOSSARY_CATEGORY_LABELS[cat] || cat)}</div>` +
        byCat[cat].map((m) =>
          `<button type="button" class="vf-cov" data-missing="${esc(cat)}|${esc(m.slug)}|${esc(m.value)}">
            <div class="cov-slug">${esc(m.slug)}</div>
            <div class="cov-cat">value "${esc(m.value)}" — click to define</div>
          </button>`
        ).join('') +
        `</div>`
      ).join('');
  }

  document.getElementById('verifyPanel').addEventListener('change', (e) => {
    const cb = e.target.closest('[data-fv]');
    if (!cb || state.entity !== 'plants' || state.mode !== 'edit') return;
    const key = cb.getAttribute('data-fv');
    const slug = state.originalSlug;
    const set = new Set(state.fieldVerified[slug] || []);
    if (e.target.checked) set.add(key); else set.delete(key);
    state.fieldVerified[slug] = [...set];
    localStorage.setItem('plant-field-verified', JSON.stringify(state.fieldVerified));
    cb.closest('.vf-item').classList.toggle('checked', e.target.checked);
    const total = cfg().fields.length;
    const countEl = document.querySelector('.vp-count');
    if (countEl) countEl.textContent = `${set.size} / ${total}`;
  });

  // Click a coverage gap → open the add form pre-filled with the exact slug/category.
  document.getElementById('verifyPanel').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-missing]');
    if (!btn) return;
    const [category, slug, value] = btn.getAttribute('data-missing').split('|');
    openAddPrefilled({ category, slug, term: humanize(value) });
  });

  function humanize(s) {
    return String(s || '').replace(/-/g, ' ').replace(/^\w/, (c) => c.toUpperCase());
  }

  // ---- autosave ----
  let autoSaveTimer = null;

  function scheduleAutoSave() {
    if (state.mode !== 'edit') return;
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(autoSave, 800);
  }

  function setAutoSaveStatus(text, cls) {
    const el = document.getElementById('autosaveStatus');
    if (el) { el.textContent = text; el.className = 'autosave-status ' + (cls || ''); }
  }

  // Absorb the server response (records + terms-mode coverage) into state.
  function setRecords(data) {
    const c = cfg();
    state[c.dataKey] = c.payloadFromData(data) || [];
    if (state.entity === 'terms') { state.missing = data.missing || []; refreshTermDatalist(); }
  }

  async function autoSave() {
    const c = cfg();
    const rec = collect();
    const errors = validateActive(rec);
    const hasRequiredErrors = c.fields.some((f) => f.required && errors[f.key]);
    if (hasRequiredErrors) { setAutoSaveStatus('Waiting for required fields…', ''); return; }
    setAutoSaveStatus('Saving…', '');
    try {
      const body = c.hasImage ? { record: rec, imageDataUrl: state.imageDataUrl || undefined } : { record: rec };
      const data = await api('PUT', `${c.api}/${encodeURIComponent(state.originalSlug)}`, body);
      setRecords(data);
      if (rec.slug !== state.originalSlug) { state.originalSlug = rec.slug; }
      setAutoSaveStatus('Saved', 'ok');
      setTimeout(() => setAutoSaveStatus('', ''), 2000);
      renderList();
      if (state.entity === 'terms') renderVerifyPanel();
    } catch (e) {
      setAutoSaveStatus('Save failed', 'bad');
      toast(e.message || 'Save failed', 'bad');
    }
  }

  async function save() {
    const c = cfg();
    const errors = showErrors(true);
    if (Object.keys(errors).length) { toast('Fix the highlighted fields', 'bad'); return; }
    const record = collect();
    try {
      const body = c.hasImage ? { record, imageDataUrl: state.imageDataUrl || undefined } : { record };
      const data = state.mode === 'add'
        ? await api('POST', c.api, body)
        : await api('PUT', `${c.api}/${encodeURIComponent(state.originalSlug)}`, body);
      setRecords(data);
      const ph = (c.hasImage && data.placeholders && !data.placeholders.ok) ? ' (⚠ placeholder regen failed — run build-placeholders.mjs)' : '';
      toast(`Saved "${c.title(record)}" · ${data.count} ${c.label.toLowerCase()}${ph}`, ph ? 'bad' : 'ok');
      // re-open in edit mode at the (possibly new) slug
      openEdit(record.slug);
    } catch (e) {
      if (e.data && e.data.errors) {
        for (const k of Object.keys(e.data.errors)) state.touched.add(k);
        showErrors(true);
      }
      toast(e.message || 'Save failed', 'bad');
    }
  }

  function confirmDelete() {
    const c = cfg();
    $('#mTitle').textContent = `Delete "${state.originalSlug}"?`;
    $('#mBody').innerHTML = c.deleteWarning(state.originalSlug);
    const modal = $('#modal');
    modal.classList.add('show');
    const ok = $('#mOk'), cancel = $('#mCancel');
    const close = () => { modal.classList.remove('show'); ok.onclick = cancel.onclick = null; };
    cancel.onclick = close;
    ok.onclick = async () => {
      close();
      try {
        const data = await api('DELETE', `${c.api}/${encodeURIComponent(state.originalSlug)}`);
        setRecords(data);
        toast(`Deleted · ${data.count} ${c.label.toLowerCase()}`, 'ok');
        closeForm();
      } catch (e) { toast(e.message || 'Delete failed', 'bad'); }
    };
  }

  // ---- open / close ----
  function resetFormState() { clearTimeout(autoSaveTimer); state.touched = new Set(); state.slugDirty = false; state.imageDataUrl = null; }

  function openAdd() {
    state.mode = 'add'; state.originalSlug = null; resetFormState();
    renderForm(cfg().newRecord());
    renderVerifyPanel();
    renderList();
  }

  // Open the add form pre-seeded (used by the coverage worklist). slugDirty so the
  // pre-filled enum-backed slug isn't overwritten by the auto-slug.
  function openAddPrefilled(seed) {
    state.mode = 'add'; state.originalSlug = null; resetFormState();
    state.slugDirty = true;
    renderForm(Object.assign(cfg().newRecord(), seed));
    renderVerifyPanel();
    renderList();
  }

  function openEdit(slug) {
    const r = records().find((x) => x.slug === slug);
    if (!r) return;
    state.mode = 'edit'; state.originalSlug = slug; resetFormState(); state.slugDirty = true;
    renderForm(JSON.parse(JSON.stringify(r)));
    renderVerifyPanel();
    renderList();
  }

  function closeForm() {
    state.mode = null; state.originalSlug = null; resetFormState();
    $('#form').innerHTML = `<div class="empty">Select a ${cfg().noun} to edit, or click <strong>${esc(cfg().addLabel)}</strong>.</div>`;
    renderVerifyPanel();
    renderList();
  }

  // ---- controls + entity switch ----
  function renderControls() {
    const c = cfg();
    $('#addBtn').textContent = c.addLabel;
    const search = $('#search');
    search.placeholder = c.searchPlaceholder;
    search.value = '';
    const sel = $('#filter');
    sel.innerHTML = [`<option value="">${esc(c.filter.label)}</option>`]
      .concat(c.filter.options().map((v) => `<option value="${esc(v)}">${esc(c.filter.optionLabel(v))}</option>`))
      .join('');
    sel.value = '';
  }

  function setEntity(entity) {
    if (entity === state.entity || !MODES[entity]) return;
    state.entity = entity;
    state.search = ''; state.filterValue = '';
    document.querySelectorAll('#entityToggle button').forEach((b) =>
      b.classList.toggle('active', b.getAttribute('data-entity') === entity));
    $('#saveNote').innerHTML = cfg().saveNote;
    renderControls();
    closeForm(); // resets the form, then renders verify panel + list for the new entity
  }

  function refreshTermDatalist() {
    const dl = document.getElementById('term-slugs');
    if (!dl) return;
    dl.innerHTML = state.terms.map((t) => `<option value="${esc(t.slug)}">${esc(t.term || '')}</option>`).join('');
  }

  // Single delegated handler for dynamic add/del rows — registered once so it doesn't multiply on re-renders.
  $('#form').addEventListener('click', (e) => {
    const t = e.target;
    let changed = true;
    if (t.classList.contains('kv-add')) {
      const box = t.closest('.kv');
      const r = document.createElement('div');
      r.className = 'kv-row';
      r.innerHTML = `<input type="text" class="kv-k" placeholder="key" /><input type="text" class="kv-v" placeholder="value" /><button type="button" class="mini ghost kv-del">✕</button>`;
      box.insertBefore(r, t);
    } else if (t.classList.contains('kv-del')) {
      t.closest('.kv-row').remove();
    } else if (t.classList.contains('link-add')) {
      const box = t.closest('.links');
      const r = document.createElement('div');
      r.className = 'link-row';
      r.innerHTML = `<input type="text" class="link-url" placeholder="https://…" /><input type="text" class="link-label" placeholder="label (optional)" /><button type="button" class="mini ghost link-open" title="Open link">↗</button><button type="button" class="mini ghost link-del">✕</button>`;
      box.insertBefore(r, t);
    } else if (t.classList.contains('link-open')) {
      const url = t.closest('.link-row').querySelector('.link-url').value.trim();
      if (url) window.open(url, '_blank', 'noopener');
      changed = false;
    } else if (t.classList.contains('link-del')) {
      t.closest('.link-row').remove();
    } else if (t.classList.contains('slug-add')) {
      const box = t.closest('.sluglist');
      const r = document.createElement('div');
      r.className = 'slug-row';
      r.innerHTML = `<input type="text" class="slug-input" list="term-slugs" placeholder="related-term-slug" /><button type="button" class="mini ghost slug-del">✕</button>`;
      box.insertBefore(r, t);
    } else if (t.classList.contains('slug-del')) {
      t.closest('.slug-row').remove();
    } else {
      changed = false;
    }
    // Row mutations don't fire input/change, so nudge validation + autosave ourselves.
    if (changed) { showErrors(false); scheduleAutoSave(); }
  });

  // ---- boot ----
  $('#addBtn').addEventListener('click', openAdd);
  $('#search').addEventListener('input', (e) => { state.search = e.target.value; renderList(); });
  $('#filter').addEventListener('change', (e) => { state.filterValue = e.target.value; renderList(); });
  $('#entityToggle').addEventListener('click', (e) => {
    const b = e.target.closest('[data-entity]');
    if (b) setEntity(b.getAttribute('data-entity'));
  });
  $('#rows').addEventListener('click', (e) => {
    if (e.target.closest('.verify-check')) return;
    const row = e.target.closest('.row'); if (row) openEdit(row.getAttribute('data-slug'));
  });
  $('#rows').addEventListener('change', (e) => {
    const cb = e.target.closest('[data-verify]');
    if (!cb || state.entity !== 'plants') return;
    const slug = cb.getAttribute('data-verify');
    if (e.target.checked) state.verified.add(slug); else state.verified.delete(slug);
    localStorage.setItem('plant-verified', JSON.stringify([...state.verified]));
    cb.closest('.row').classList.toggle('verified', e.target.checked);
  });

  renderControls();

  Promise.all([
    api('GET', '/api/plants').then((d) => { state.plants = d.plants; }),
    api('GET', '/api/glossary').then((d) => { state.terms = d.terms; state.missing = d.missing || []; state.termsLoaded = true; }),
  ]).then(() => {
    refreshTermDatalist();
    renderList();
  }).catch((e) => toast('Load failed: ' + e.message, 'bad'));
})();
</script>
